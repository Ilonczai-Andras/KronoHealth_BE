version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kronohealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kronohealth}
      POSTGRES_USER: ${DB_USERNAME:-kronouser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kronopass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kronouser} -d ${DB_NAME:-kronohealth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: kronohealth-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kronohealth.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: quay.io/minio/minio
    container_name: kronohealth-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${S3_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${S3_ROOT_PASSWORD:-password123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  rclone:
    image: rclone/rclone
    container_name: kronohealth-rclone
    restart: unless-stopped
    environment:
      - RCLONE_CONFIG=/config/rclone/rclone.conf
    volumes:
      - rclone_config:/config/rclone
      - rclone_data:/data
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  rclone_config:
    driver: local
  rclone_data:
    driver: local