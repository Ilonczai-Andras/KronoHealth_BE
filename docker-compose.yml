version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kronohealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-kronohealth}
      POSTGRES_USER: ${DB_USERNAME:-kronouser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kronopass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-kronouser} -d ${DB_NAME:-kronohealth}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
