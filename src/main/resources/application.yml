spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: false

server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

  s3:
    endpoint: ${S3_ENDPOINT}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    bucket: ${S3_BUCKET}

  openai:
    api-key: ${GROQ_API_KEY}
    model: ${GROQ_MODEL}
    base-url: ${GROQ_BASE_URL}

  analysis:
    async:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100
    pdf:
      max-chars: 15000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    com.kronohealth: DEBUG
    com.kronohealth.exception: WARN
    com.kronohealth.auth: INFO
    com.kronohealth.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
