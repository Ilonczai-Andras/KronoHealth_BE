spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kronohealth}
    username: ${DB_USERNAME:kronouser}
    password: ${DB_PASSWORD:kronopass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: false

server:
  port: 8080
  servlet:
    context-path: /

app:
  cors:
    allowed-origins:
      - "http://localhost:4200"

logging:
  level:
    com.kronohealth: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
